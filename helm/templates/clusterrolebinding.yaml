{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ovnk-mcp-server.fullname" . }}
  labels:
    {{- include "ovnk-mcp-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ovnk-mcp-server.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "ovnk-mcp-server.serviceAccountName" . }}
    namespace: {{ .Values.namespace }}
{{- end }}
